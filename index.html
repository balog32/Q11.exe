<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Core System</title>
<link rel="stylesheet" href="index.css">
<!--<script src="nfc-integration.js"></script>-->
</head>

<body>

<!-- ================= TOP BAR ================= -->
<div class="topbar">

    <div class="left">
        <button onclick="openAdd()">➕ Client</button>
        <button onclick="openSearch()">🔍 Căutare</button>
        <button onclick="openSettings()">⚙️ Setări</button>
        <button onclick="openReports()">📊 Rapoarte</button>
    </div>

    <div class="right">

        <div id="nfc-status" style="
            padding: 10px 16px;
            border-radius: 8px;
            background: rgba(100, 150, 255, 0.2);
            color: #ffaa00;
            font-weight: bold;
            font-size: 12px;
            border: 2px solid rgba(100, 150, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s ease;
        ">
            🟡 NFC Standby
        </div>

        <div id="userArea" onclick="toggleUserMenu()" style="display:none;">
            👤 <span id="currentUser"></span>
        </div>

        <div id="userMenu" class="user-menu">
            <button onclick="logout()">🚪 Logout</button>
        </div>

        <button id="loginBtn" onclick="openLogin()">🔐 Login</button>

    </div>

</div>

<!-- ================= MAIN CONTAINER ================= -->
<div class="container">

    <!-- STÂNGA: CLIENȚI ÎN SALĂ -->
    <div class="left-panel">
        <div class="panel gym">
            <h2>🏋️ Clienți în sală</h2>
            <div id="gymList" class="scroll"></div>
            <div class="gym-counter">
                <strong id="gymCount">0</strong> persoane în sală
            </div>
        </div>
    </div>

    <!-- DREAPTA: INTRARE / IEȘIRE -->
    <div class="right-panel">
        
        <!-- TOP: INTRARE -->
        <div class="panel entry">
            <h2>⬆️ INTRARE</h2>
            <div id="entryList" class="entry-container"></div>
        </div>

        <!-- BOTTOM: IEȘIRE -->
        <div class="panel exit">
            <h2>⬇️ IEȘIRE</h2>
            <div id="exitList" class="exit-container"></div>
        </div>

    </div>

</div>

<!-- ================= MODALS ================= -->

<!-- ADD CLIENT -->
<div id="addModal" class="modal">
  <div class="box scroll-box">

    <h2>➕ Client nou</h2>

    <input id="name" placeholder="Nume">
    <input id="surname" placeholder="Prenume">

    <!-- ABONAMENTE -->
    <select id="subscription">
        <option value="">Selectează abonament</option>

        <optgroup label="Elevi">
            <option value="elev_standard">Elev Standard (07-17)</option>
            <option value="elev_full">Elev Full (07-21)</option>
        </optgroup>

        <optgroup label="Adulți">
            <option value="adult_standard">Adult Standard (07-17)</option>
            <option value="adult_full">Adult Full (07-21)</option>
        </optgroup>

        <optgroup label="Special">
            <option value="2weeks">2 Săptămâni</option>
        </optgroup>
    </select>

    <!-- PERIOADA PERSONALIZATA -->
    <div style="background: rgba(100, 150, 255, 0.1); padding: 12px; border-radius: 8px; border-left: 4px solid #6496ff;">
        <label style="color: #6496ff; font-weight: bold; display: block; margin-bottom: 8px;">📅 Perioada valabilitate (zile):</label>
        <input type="date" id="customDays" placeholder="30" min="1" max="365" value="30" style="width: 100%; padding: 10px; border: 2px solid #6496ff; border-radius: 8px; background: rgba(100, 150, 255, 0.1); color: #e0e0e0;">
    </div>

    <!-- CAMERA -->
    <video id="video" autoplay playsinline style="width: 100%; height: 220px; border-radius: 14px; background: #0f1b2e; border: 2px solid rgba(255, 140, 0, 0.25); object-fit: cover;"></video>
    <img id="preview" style="display: none; width: 100%; height: 220px; border-radius: 14px; background: #0f1b2e; border: 2px solid rgba(255, 140, 0, 0.25); object-fit: cover;">

    <div class="photo-buttons">
        <button onclick="capture()">📸 Fă poză</button>
        <button onclick="startCamera()">🔄 Repornește</button>
    </div>

    <!-- TAG / NFC CARD -->
<div style="background: rgba(0, 255, 136, 0.1); padding: 12px; border-radius: 8px; border-left: 4px solid #00ff88;">
    <label style="color: #00ff88; font-weight: bold; display: block; margin-bottom: 8px;">🏷️ Tag NFC (scanează sau introdu manual):</label>
    <div style="display: flex; gap: 10px;">
        <input id="tag" placeholder="Scanează tagul NFC..." style="flex: 3; padding: 12px; border: 2px solid rgba(0, 255, 136, 0.4); background: rgba(0, 255, 136, 0.1); color: #0f0; font-family: monospace; font-size: 14px;">
        <button type="button" onclick="scanTagForAdd()" style="flex: 1; background: #00ff88; color: black; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s;">🔍 Scanează</button>
    </div>
</div>

    <!-- BUTOANE -->
    <div class="actions">
        <button onclick="saveClient()">💾 Salvează</button>
        <button onclick="closeAdd()">❌ Închide</button>
    </div>

  </div>
</div>

<!-- SEARCH CLIENT -->
<div id="searchModal" class="modal">
  <div class="box">

    <h2>🔍 Caută client</h2>

    <input id="search" placeholder="Scrie numele sau scanează NFC..." oninput="searchClient()">

    <div id="results" class="scroll"></div>

    <button onclick="closeSearch()">Închide</button>

  </div>
</div>

<!-- LOGIN -->
<div id="loginModal" class="modal">
  <div class="box">

    <h2>🔐 Login</h2>

    <input id="loginUser" placeholder="User">

    <div style="display:flex; gap:5px;">
        <input id="loginCode" type="password" placeholder="Cod">
        <button onclick="togglePassword()">👁</button>
    </div>

    <div id="loginError"></div>

    <button onclick="login()">✔ Login</button>
    <button onclick="closeLogin()">❌ Închide</button>

  </div>
</div>

<script src="index.js"></script>
</body>
</html>
